<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skillora - AI Learning System</title>

  <meta name="description" content="Skillora is a minimalist AI-powered learning system that helps you master any skill with structured daily guidance." />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
    }

    h1 {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .box {
      border: 1px solid #333;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      background: #111;
      border: 1px solid #333;
      color: white;
      border-radius: 8px;
      margin-top: 10px;
    }

    button {
      margin-top: 12px;
      padding: 12px 16px;
      background: white;
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }

    button:hover {
      opacity: 0.85;
    }

    .output {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.8;
      white-space: pre-line;
    }

    .tag {
      font-size: 12px;
      opacity: 0.5;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="tag">AI Learning System</div>

  <h1>Skillora</h1>

  <p>
    A minimalist AI system that helps you master any skill through structured daily learning and focused guidance.
  </p>

  <!-- SKILL INPUT -->
  <div class="box">
    <strong>Start Learning</strong>
    <input id="skillInput" placeholder="Enter a skill (Python, Design, Chess...)" />
    <button onclick="generateRoadmap()">Generate Roadmap</button>
    <div id="roadmap" class="output"></div>
  </div>

  <!-- AI COACH -->
  <div class="box">
    <strong>AI Coach</strong>
    <input id="chatInput" placeholder="Ask Skillora..." />
    <button onclick="askAI()">Ask</button>
    <div id="reply" class="output"></div>
  </div>

</div>

<script>

let currentSkill = "";

async function generateRoadmap() {
  const skill = document.getElementById("skillInput").value;
  currentSkill = skill;

  const res = await fetch("/api/roadmap", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ skill })
  });

  const data = await res.json();

  document.getElementById("roadmap").innerText =
    "Day 1: " + (data.roadmap?.[0] || "Start learning fundamentals");
}

async function askAI() {
  const message = document.getElementById("chatInput").value;

  const res = await fetch("/api/coach", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message,
      skill: currentSkill
    })
  });

  const data = await res.json();

  document.getElementById("reply").innerText =
    data.reply || "Keep going — consistency matters more than motivation.";
}

</script>

</body>
</html>
