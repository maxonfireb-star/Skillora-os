<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skillora - AI Learning System</title>

  <meta name="description" content="Skillora is an AI-powered daily learning system that helps you master any skill with structured roadmaps and an AI coach." />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f17;
      color: white;
      text-align: center;
      padding: 30px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    input {
      padding: 12px;
      width: 260px;
      border-radius: 8px;
      border: none;
      outline: none;
      margin: 10px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #4f7cff;
      color: white;
      cursor: pointer;
    }

    .card {
      background: #111827;
      padding: 20px;
      margin: 20px auto;
      max-width: 500px;
      border-radius: 12px;
    }

    .muted {
      opacity: 0.7;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>🌟 Skillora</h1>
  <p class="muted">AI-powered daily skill learning system</p>

  <!-- SKILL INPUT -->
  <div class="card">
    <h3>Start Learning</h3>
    <input id="skillInput" placeholder="Enter a skill (e.g. Python, Chess)" />
    <br />
    <button onclick="startSkill()">Generate Roadmap</button>

    <p id="roadmapOutput" style="margin-top:15px;"></p>
  </div>

  <!-- AI COACH -->
  <div class="card">
    <h3>AI Coach</h3>
    <input id="chatInput" placeholder="Ask Skillora anything..." />
    <br />
    <button onclick="askCoach()">Ask AI</button>

    <p id="coachOutput" style="margin-top:15px;"></p>
  </div>

<script>

let currentSkill = "";

// 🚀 Generate Roadmap
async function startSkill() {
  const skill = document.getElementById("skillInput").value;
  currentSkill = skill;

  const res = await fetch("/api/roadmap", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ skill })
  });

  const data = await res.json();

  document.getElementById("roadmapOutput").innerText =
    "Day 1: " + (data.roadmap?.[0] || "Learn basics");
}

// 🤖 AI Coach Chat
async function askCoach() {
  const message = document.getElementById("chatInput").value;

  const res = await fetch("/api/coach", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      message,
      skill: currentSkill
    })
  });

  const data = await res.json();

  document.getElementById("coachOutput").innerText =
    data.reply || "Keep going!";
}

</script>

</body>
  </html>
