<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Skillora</title>

<style>
  :root { --accent: #3b82f6; --bg: #000; --card: #111; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header { padding: 20px; text-align: center; font-size: 24px; font-weight: 800; }

  .content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }

  /* INPUT BOX */
  #searchArea { width: 100%; max-width: 400px; text-align: center; }
  input {
    width: 100%; padding: 16px; background: var(--card); color: #fff;
    border: 1px solid #333; border-radius: 12px; font-size: 16px; margin-bottom: 10px;
  }
  .btn {
    width: 100%; padding: 16px; border-radius: 12px; border: none;
    font-weight: bold; cursor: pointer; font-size: 16px;
  }
  .btn-primary { background: #fff; color: #000; }
  .btn-coach { background: var(--accent); color: #fff; }

  /* CAROUSEL */
  #roadmapContainer { display: none; width: 100%; max-width: 450px; }
  .viewport { overflow: hidden; border-radius: 20px; background: var(--card); border: 1px solid #222; }
  .track { display: flex; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
  
  .slide { min-width: 100%; padding: 25px; min-height: 300px; }
  .day-num { color: var(--accent); font-size: 12px; font-weight: 800; text-transform: uppercase; }
  .day-title { font-size: 22px; margin: 8px 0 15px; font-weight: 700; }

  .task {
    display: flex; align-items: center; gap: 12px; padding: 12px;
    background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 8px;
  }
  .check { width: 20px; height: 20px; border: 2px solid var(--accent); border-radius: 6px; }
  .task.done { opacity: 0.4; }
  .task.done .check { background: var(--accent); }

  .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
  .arrow { width: 45px; height: 45px; background: var(--card); border: 1px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; }

  /* COACH PANEL */
  .ai-btn { position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; background: var(--accent); border-radius: 16px; display: flex; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
  .panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 350px; height: 100vh; background: #080808; border-left: 1px solid #222; z-index: 1000; transition: 0.3s; display: flex; flex-direction: column; }
  .panel.open { right: 0; }
  .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .msg { padding: 12px; border-radius: 12px; font-size: 14px; max-width: 85%; }
  .u { background: var(--accent); align-self: flex-end; }
  .a { background: #1a1a1a; align-self: flex-start; border: 1px solid #333; }

  .loader-overlay { display: none; position: absolute; text-align: center; }
  .spinner { border: 3px solid #333; border-top: 3px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>Skillora</header>

<div class="content-area">
  <div id="searchArea">
    <h2 style="font-weight: 400; opacity: 0.7;">What's your next skill?</h2>
    <input id="skill" placeholder="e.g. Chess, Coding, Yoga..." onkeypress="if(event.key==='Enter') generate()">
    <button class="btn btn-primary" onclick="generate()">Build My Path</button>
  </div>

  <div id="loader" class="loader-overlay">
    <div class="spinner"></div>
    <p style="opacity: 0.6;">Forging your roadmap...</p>
  </div>

  <div id="roadmapContainer">
    <div class="viewport">
      <div id="track" class="track"></div>
    </div>
    <div class="controls">
      <div class="arrow" onclick="move(-1)">←</div>
      <div id="counter" style="font-weight: bold;">1 / 7</div>
      <div class="arrow" onclick="move(1)">→</div>
    </div>
  </div>
</div>

<div class="ai-btn" onclick="toggle()">💬</div>

<div id="panel" class="panel">
  <div style="padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between;">
    <b>AI Coach</b> <span onclick="toggle()" style="cursor: pointer;">✕</span>
  </div>
  <div id="chat" class="chat-box">
    <div class="msg a">Hi! Generate a roadmap first, then ask me for deep-dives on any day.</div>
  </div>
  <div style="padding: 20px; background: #000;">
    <input id="msg" placeholder="Ask a question..." onkeypress="if(event.key==='Enter') ask()">
    <button class="btn btn-coach" onclick="ask()">Ask Coach</button>
  </div>
</div>

<script>
  let step = 0, total = 0, skillName = "";

  async function generate() {
    const input = document.getElementById("skill");
    if (!input.value.trim()) return;
    skillName = input.value;

    // Show Loading, Hide Search
    document.getElementById("searchArea").classList.add("hidden");
    document.getElementById("loader").style.display = "block";

    try {
      const res = await fetch("/api/roadmap", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ skill: skillName })
      });
      const data = await res.json();
      
      if (!data.roadmap || data.roadmap.length === 0) throw "Empty";

      total = data.roadmap.length;
      const track = document.getElementById("track");
      track.innerHTML = "";

      data.roadmap.forEach((d, i) => {
        const slide = document.createElement("div");
        slide.className = "slide";
        slide.innerHTML = `
          <div class="day-num">${d.day}</div>
          <div class="day-title">${d.title}</div>
          <div>${d.tasks.map(t => `<div class="task" onclick="this.classList.toggle('done')"><div class="check"></div><span>${t}</span></div>`).join('')}</div>
        `;
        track.appendChild(slide);
      });

      document.getElementById("loader").style.display = "none";
      document.getElementById("roadmapContainer").style.display = "block";
      update();
    } catch (e) {
      alert("AI is busy. Please refresh and try again!");
      location.reload();
    }
  }

  function move(dir) {
    step = Math.max(0, Math.min(total - 1, step + dir));
    document.getElementById("track").style.transform = `translateX(-${step * 100}%)`;
    update();
  }

  function update() { document.getElementById("counter").innerText = (step + 1) + " / " + total; }
  function toggle() { document.getElementById("panel").classList.toggle("open"); }

  async function ask() {
    const box = document.getElementById("msg");
    const chat = document.getElementById("chat");
    if (!box.value.trim()) return;

    chat.innerHTML += `<div class="msg u">${box.value}</div>`;
    const m = box.value;
    box.value = "";
    chat.scrollTop = chat.scrollHeight;

    const res = await fetch("/api/coach", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: m, skill: skillName })
    });
    const d = await res.json();
    chat.innerHTML += `<div class="msg a">${d.reply}</div>`;
    chat.scrollTop = chat.scrollHeight;
  }
</script>
</body>
</html>
