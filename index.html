<style>
  :root {
    --primary: #fff;
    --accent: #3b82f6; 
    --bg: #000;
    --card-bg: #111;
    --border: #222;
  }

  * { box-sizing: border-box; transition: all 0.2s ease; }
  
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--primary);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
  }

  .main-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }

  /* INPUT AREA */
  .search-area {
    width: 100%;
    max-width: 450px;
    text-align: center;
    z-index: 10;
  }

  .search-area h2 { margin-bottom: 20px; font-weight: 400; opacity: 0.8; }

  input {
    width: 100%;
    padding: 16px;
    background: var(--card-bg);
    color: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 16px;
    margin-bottom: 12px;
  }

  input:focus { outline: none; border-color: var(--accent); }

  button.cta {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: #000;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    font-size: 16px;
  }

  /* CAROUSEL */
  #roadmap-container {
    display: none;
    width: 100%;
    max-width: 500px;
  }

  .carousel-viewport {
    overflow: hidden;
    width: 100%;
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .carousel-track {
    display: flex;
    transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .day-card {
    min-width: 100%;
    padding: 25px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    min-height: 350px;
  }

  .day-label { color: var(--accent); font-weight: 800; font-size: 12px; text-transform: uppercase; }
  .day-title { font-size: 24px; margin: 10px 0 20px; font-weight: 700; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
  }

  .task-item.done { opacity: 0.4; }
  .task-item.done span { text-decoration: line-through; }
  .checkbox { width: 20px; height: 20px; border: 2px solid var(--accent); border-radius: 6px; flex-shrink: 0; }
  .task-item.done .checkbox { background: var(--accent); }

  .nav-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    width: 100%;
  }

  .arrow {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: white;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
