<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skillora</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      padding: 30px;
      text-align: center;
    }

    h1 { font-size: 48px; }

    input {
      padding: 12px;
      width: 260px;
      background: #111;
      border: 1px solid #333;
      color: white;
      border-radius: 8px;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      background: white;
      color: black;
      border: none;
      border-radius: 8px;
      width: 260px;
      cursor: pointer;
    }

    .card {
      border: 1px solid #333;
      padding: 20px;
      margin: 20px auto;
      max-width: 500px;
      border-radius: 12px;
      text-align: left;
    }

    .day {
      border-top: 1px solid #222;
      padding: 10px 0;
    }

  </style>
</head>

<body>

<h1>Skillora</h1>
<p>AI-powered structured learning system</p>

<div class="card">
  <h3>Start Learning</h3>
  <input id="skill" placeholder="Enter skill" />
  <button onclick="generate()">Generate 7-Day Plan</button>
  <div id="roadmap"></div>
</div>

<div class="card">
  <h3>AI Coach</h3>
  <input id="msg" placeholder="Ask something..." />
  <button onclick="ask()">Ask AI</button>
  <div id="reply"></div>
</div>

<script>

let currentSkill = "";
let roadmapData = [];

async function generate() {
  const skill = document.getElementById("skill").value;
  currentSkill = skill;

  const res = await fetch("/api/roadmap", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ skill })
  });

  const data = await res.json();

  roadmapData = data.roadmap;

  const container = document.getElementById("roadmap");
  container.innerHTML = "";

  roadmapData.forEach(d => {
    const div = document.createElement("div");
    div.className = "day";

    div.innerHTML = `
      <b>${d.day} - ${d.title}</b><br/>
      ${d.tasks.map(t => "• " + t).join("<br/>")}
    `;

    container.appendChild(div);
  });
}

async function ask() {
  const message = document.getElementById("msg").value;

  const res = await fetch("/api/coach", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message,
      skill: currentSkill
    })
  });

  const data = await res.json();

  document.getElementById("reply").innerText = data.reply;
}

</script>

</body>
</html>
