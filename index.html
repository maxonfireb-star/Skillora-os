<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skillora | Forge Mastery</title>
    <style>
        :root {
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --bg: #050505;
            --card: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; background-color: var(--bg); color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, transparent 50%);
        }

        header {
            padding: 40px 20px 10px; text-align: center;
            font-size: 22px; font-weight: 900; letter-spacing: 5px;
            text-transform: uppercase; color: var(--accent);
        }

        .container { height: calc(100vh - 100px); display: flex; align-items: center; justify-content: center; padding: 20px; }

        /* HERO SECTION */
        #hero { width: 100%; max-width: 400px; text-align: center; transition: 0.5s; }
        .glass-input {
            width: 100%; padding: 20px; background: var(--card);
            border: 1px solid var(--border); border-radius: 20px;
            color: #fff; font-size: 16px; backdrop-filter: blur(15px);
            margin-bottom: 15px; outline: none;
        }
        .btn-forge {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: #fff; color: #000; font-weight: 800; cursor: pointer;
        }

        /* ROADMAP SECTION */
        #roadmap { display: none; width: 100%; max-width: 420px; }
        .view {
            overflow: hidden; border-radius: 30px;
            background: var(--card); border: 1px solid var(--border);
            backdrop-filter: blur(25px); box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .track { display: flex; transition: transform 0.8s cubic-bezier(0.2, 1, 0.2, 1); }
        .slide { min-width: 100%; padding: 35px; min-height: 400px; display: flex; flex-direction: column; }
        .day-label { color: var(--accent); font-size: 11px; font-weight: 900; letter-spacing: 2px; margin-bottom: 8px; }
