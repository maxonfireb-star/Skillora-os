<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Skillora | Forge Your Path</title>

<style>
  :root { --accent: #3b82f6; --bg: #000; --card: #111; --text: #fff; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
  
  body {
    margin: 0; background: var(--bg); color: var(--text); height: 100vh;
    display: flex; flex-direction: column; overflow: hidden;
  }

  body::after {
    content: ""; position: absolute; top: -10%; right: -10%; width: 50%; height: 50%;
    background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%); z-index: -1;
  }

  header { padding: 30px 20px 10px; text-align: center; font-size: 32px; font-weight: 900; letter-spacing: -1px; }

  .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }

  #hero { width: 100%; max-width: 400px; text-align: center; transition: 0.5s; }
  input {
    width: 100%; padding: 18px; background: #0a0a0a; color: #fff; border: 1px solid #222;
    border-radius: 16px; font-size: 16px; margin-bottom: 12px; outline: none;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(59,130,246,0.2); }
  
  .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 800; cursor: pointer; font-size: 16px; transition: 0.2s; }
  .btn-p { background: #fff; color: #000; }
  .btn-p:active { transform: scale(0.98); }

  #roadmap { display: none; width: 100%; max-width: 450px; }
  .view { overflow: hidden; border-radius: 28px; background: #050505; border: 1px solid #1a1a1a; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
  .track { display: flex; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
  
  .slide { min-width: 100%; padding: 30px; min-height: 380px; display: flex; flex-direction: column; }
  .d-num { color: var(--accent); font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
  .d-title { font-size: 26px; margin: 10px 0 20px; font-weight: 800; line-height: 1.2; }

  .task {
    display: flex; align-items: center; gap: 15px; padding: 14px;
    background: rgba(255,255,255,0.03); border-radius: 14px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
  }
  .check { width: 22px; height: 22px; border: 2px solid var(--accent); border-radius: 7px; flex-shrink: 0; }
  .task.done { opacity: 0.4; transform: scale(0.98); }
  .task.done .check { background: var(--accent); }
