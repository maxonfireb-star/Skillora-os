<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skillora | Master Anything</title>

<style>
  :root {
    --primary: #fff;
    --accent: #3b82f6; /* Modern Blue */
    --bg: #000;
    --card-bg: #111;
    --border: #222;
  }

  * { box-sizing: border-box; transition: all 0.3s ease; }
  
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--primary);
    overflow: hidden; /* Prevent body scroll, use container scroll */
    height: 100vh;
  }

  /* COOL BACKGROUND EFFECT */
  body::before {
    content: "";
    position: absolute;
    top: -10%; left: -10%;
    width: 40%; height: 40%;
    background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
    z-index: -1;
  }

  header {
    padding: 30px 20px;
    text-align: center;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -1.5px;
    background: linear-gradient(to bottom, #000, transparent);
  }

  .main-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 80vh;
    padding: 20px;
  }

  /* INPUT BOX */
  .search-area {
    width: 100%;
    max-width: 500px;
    margin-bottom: 40px;
    z-index: 10;
  }

  input {
    width: 100%;
    padding: 18px;
    background: var(--card-bg);
    color: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    font-size: 18px;
    text-align: center;
  }

  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 20px rgba(59,130,246,0.2); }

  /* CAROUSEL SYSTEM */
  #roadmap-container {
    display: none;
    width: 100%;
    max-width: 600px;
    position: relative;
  }

  .carousel-viewport {
    overflow: hidden;
    width: 100%;
  }

  .carousel-track {
    display: flex;
    transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
  }

  .day-card {
    min-width: 100%;
    padding: 30px;
    background: linear-gradient(145deg, #111, #050505);
    border: 1px solid var(--border);
    border-radius: 24px;
    user-select: none;
  }

  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .day-number { font-weight: 800; color: var(--accent); font-size: 14px; text-transform: uppercase; }
  
  .day-title { font-size: 26px; font-weight: 700; margin: 10px 0; }

  .task-list { margin-top: 20px; }

  .task-item {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.03);
    cursor: pointer;
  }

  .task-item:hover { background: rgba(255,255,255,0.08); }

  .dot { width: 12px; height: 12px; border: 2px solid var(--accent); border-radius: 50%; }
  .task-item.done .dot { background: var(--accent); }
  .task-item.done span { text-decoration: line-through; opacity: 0.5; }

  /* NAVIGATION ARROWS */
  .nav-arrows {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
  }

  .arrow {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
  }

  .arrow:hover { background: #222; transform: translateY(-2px); }

  /* FLOATING COACH */
  .ai-trigger {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    background: var(--accent);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(59,130,246,0.3);
    z-index: 100;
  }

  /* SIDEBAR */
  .chat-panel {
    position: fixed;
    top: 0; right: -400px;
    width: 100%; max-width: 380px;
    height: 100vh; background: #000;
    border-left: 1px solid var(--border);
    z-index: 1000; display: flex; flex-direction: column;
  }
  .chat-panel.open { right: 0; }

  .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .bubble { padding: 12px; border-radius: 12px; font-size: 14px; max-width: 80%; }
  .user { background: var(--accent); align-self: flex-end; }
  .ai { background: #222; align-self: flex-start; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>Skillora</header>

<div class="main-wrapper">
  
  <div class="search-area" id="searchArea">
    <input id="skill" placeholder="I want to learn..." onkeypress="if(event.key==='Enter') generate()">
    <button onclick="generate()" style="width:100%; padding:15px; margin-top:10px; border-radius:12px; border:none; background:white; font-weight:bold; cursor:pointer;">Forge Roadmap</button>
  </div>

  <div id="roadmap-container">
    <div class="carousel-viewport">
      <div id="carouselTrack" class="carousel-track">
        </div>
    </div>

    <div class="nav-arrows">
      <div class="arrow" onclick="moveSlide(-1)">←</div>
      <div id="dayCounter" style="display:flex; align-items:center; font-weight:bold;">1 / 7</div>
      <div class="arrow" onclick="moveSlide(1)">→</div>
    </div>
  </div>

</div>

<div class="ai-trigger" onclick="toggleChat()">💬</div>

<div id="chatPanel" class="chat-panel">
  <div style="padding:20px; border-bottom:1px solid #222; display:flex; justify-content:space-between">
    <b>AI Coach</b>
    <span onclick="toggleChat()" style="cursor:pointer">✕</span>
  </div>
  <div id="chatBox" class="chat-box"></div>
  <div style="padding:20px; border-top:1px solid #222">
    <input id="msg" placeholder="Ask anything..." style="font-size:14px">
    <button onclick="ask()" style="width:100%; margin-top:10px; padding:10px; border-radius:8px; border:none; background:var(--accent); color:white; font-weight:bold;">Send</button>
  </div>
</div>

<script>
let currentSlide = 0;
let totalSlides = 0;
let currentSkill = "";

async function generate() {
  const skill = document.getElementById("skill").value;
  if(!skill) return;
  currentSkill = skill;

  document.getElementById("searchArea").classList.add("hidden");
  const container = document.getElementById("roadmap-container");
  container.style.display = "block";
  
  const track = document.getElementById("carouselTrack");
  track.innerHTML = "<div style='width:100%; text-align:center; padding:50px;'>Generating your future...</div>";

  const res = await fetch("/api/roadmap", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ skill })
  });

  const data = await res.json();
  totalSlides = data.roadmap.length;
  track.innerHTML = "";

  data.roadmap.forEach((d, i) => {
    const card = document.createElement("div");
    card.className = "day-card";
    card.innerHTML = `
      <div class="day-header">
        <div class="day-number">${d.day}</div>
        <div style="font-size:12px; opacity:0.5;">${Math.round(((i+1)/totalSlides)*100)}% Complete</div>
      </div>
      <div class="day-title">${d.title}</div>
      <div class="task-list">
        ${d.tasks.map(t => `
          <div class="task-item" onclick="this.classList.toggle('done')">
            <div class="dot"></div>
            <span>${t}</span>
          </div>
        `).join('')}
      </div>
    `;
    track.appendChild(card);
  });
  
  updateCounter();
}

function moveSlide(direction) {
  currentSlide = Math.max(0, Math.min(totalSlides - 1, currentSlide + direction));
  const track = document.getElementById("carouselTrack");
  track.style.transform = `translateX(-${currentSlide * 100}%)`;
  updateCounter();
}

function updateCounter() {
  document.getElementById("dayCounter").innerText = `${currentSlide + 1} / ${totalSlides}`;
}

// ARROW KEY SUPPORT
document.addEventListener('keydown', (e) => {
  if (e.key === "ArrowLeft") moveSlide(-1);
  if (e.key === "ArrowRight") moveSlide(1);
});

function toggleChat() { document.getElementById("chatPanel").classList.toggle("open"); }

async function ask() {
  const input = document.getElementById("msg");
  const text = input.value;
  if(!text) return;
  
  const box = document.getElementById("chatBox");
  box.innerHTML += `<div class="bubble user">${text}</div>`;
  input.value = "";

  const res = await fetch("/api/coach", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text, skill: currentSkill })
  });
  const data = await res.json();
  box.innerHTML += `<div class="bubble ai">${data.reply}</div>`;
  box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
