<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skillora</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: #fff;
}

/* HEADER */
header {
  padding: 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
}

/* MAIN */
.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

/* ROADMAP */
.card {
  border: 1px solid #333;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
}

.day {
  border-top: 1px solid #222;
  padding: 10px 0;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  background: #111;
  color: white;
  border: 1px solid #333;
  border-radius: 8px;
}

button {
  padding: 12px;
  width: 100%;
  margin-top: 10px;
  background: white;
  color: black;
  border: none;
  border-radius: 8px;
}

/* FLOATING BUTTON */
.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: white;
  color: black;
  border-radius: 50px;
  padding: 14px 18px;
  font-weight: bold;
  cursor: pointer;
}

/* CHAT PANEL */
.chatPanel {
  position: fixed;
  right: -320px;
  top: 0;
  width: 300px;
  height: 100vh;
  background: #111;
  border-left: 1px solid #333;
  padding: 15px;
  transition: 0.3s;
}

.chatPanel.open {
  right: 0;
}

.chatBox {
  height: 70vh;
  overflow-y: auto;
  font-size: 14px;
}

</style>
</head>

<body>

<header>Skillora</header>

<div class="container">

  <input id="skill" placeholder="Enter skill (e.g. Cooking)" />
  <button onclick="generate()">Generate Roadmap</button>

  <div id="roadmap" class="card">
    Your roadmap will appear here
  </div>

</div>

<!-- FLOATING COACH BUTTON -->
<div class="fab" onclick="toggleChat()">💬 Coach</div>

<!-- CHAT PANEL -->
<div id="chatPanel" class="chatPanel">

  <h3>AI Coach</h3>

  <div id="chat" class="chatBox"></div>

  <input id="msg" placeholder="Ask..." />
  <button onclick="ask()">Send</button>

</div>

<script>

let currentSkill = "";
let roadmapData = [];

/* ROADMAP */
async function generate() {
  const skill = document.getElementById("skill").value;
  currentSkill = skill;

  document.getElementById("roadmap").innerHTML = "Loading...";

  const res = await fetch("/api/roadmap", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ skill })
  });

  const data = await res.json();
  roadmapData = data.roadmap;

  const container = document.getElementById("roadmap");
  container.innerHTML = "";

  roadmapData.forEach(d => {
    const div = document.createElement("div");
    div.className = "day";

    div.innerHTML = `
      <b>${d.day} - ${d.title}</b><br/>
      ${d.tasks.map(t => "• " + t).join("<br/>")}
    `;

    container.appendChild(div);
  });
}

/* CHAT TOGGLE */
function toggleChat() {
  document.getElementById("chatPanel").classList.toggle("open");
}

/* CHAT */
async function ask() {
  const message = document.getElementById("msg").value;

  const chatBox = document.getElementById("chat");
  chatBox.innerHTML += `<div>🧑 You: ${message}</div>`;

  const res = await fetch("/api/coach", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      message,
      skill: currentSkill
    })
  });

  const data = await res.json();

  chatBox.innerHTML += `<div>🤖 Coach: ${data.reply}</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
