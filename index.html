<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEVON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #c8f562;
            --accent2: #7efff5;
            --bg: #060608;
            --card: #0d0d10;
            --card2: #111116;
            --border: rgba(255,255,255,0.07);
            --text: #f0f0f0;
            --muted: #555;
            --radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        /* FIX: pointer-events: none ensures background doesn't block clicks */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 10;
            opacity: 0.4;
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: -1;
        }
        .glow-orb.g1 { width: 500px; height: 500px; background: rgba(200,245,98,0.04); top: -200px; left: -100px; }
        .glow-orb.g2 { width: 400px; height: 400px; background: rgba(126,255,245,0.03); bottom: -150px; right: -100px; }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 28px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo { font-size: 13px; font-weight: 900; letter-spacing: 6px; color: var(--accent); font-family: 'DM Mono', monospace; }

        .container { height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 5; }

        #hero { width: 100%; max-width: 440px; text-align: center; }
        .hero-title { font-size: clamp(32px, 10vw, 56px); font-weight: 900; line-height: 1.05; margin-bottom: 30px; background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.5) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .input-wrap input { width: 100%; padding: 18px 24px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); color: #fff; margin-bottom: 12px; outline: none; font-family: 'DM Mono'; }
        .btn-forge { width: 100%; padding: 18px; border-radius: var(--radius); border: none; background: var(--accent); color: #060608; font-weight: 900; letter-spacing: 3px; cursor: pointer; }

        /* SLIDER STYLES */
        #roadmap { display: none; width: 100%; max-width: 440px; flex-direction: column; }
        .slider-viewport { width: 100%; overflow: hidden; margin: 20px 0; border-radius: 24px; }
        .slider-track { display: flex; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .slide-card { min-width: 100%; padding: 0 5px; }
        .card-inner { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 32px 28px; min-height: 320px; }
        
        .progress-track { width: 100%; height: 2px; background: var(--border); margin-top: 8px; border-radius: 2px; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }

        .slide-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .nav-btn { background: var(--card); border: 1px solid var(--border); color: white; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-btn:disabled { opacity: 0.2; }
        .nav-dots { display: flex; gap: 8px; }
        .nav-dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; transition: 0.3s; }
        .nav-dot.active { background: var(--accent); width: 18px; border-radius: 10px; }

        /* COACH UI */
        .coach-fab { position: fixed; bottom: 28px; right: 28px; width: 56px; height: 56px; background: var(--accent); border-radius: 18px; display: flex; align-items: center; justify-content: center; z-index: 1000; cursor: pointer; box-shadow: 0 10px 40px rgba(200,245,98,0.3); }
        #panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100%; background: #08080a; z-index: 2000; transition: right 0.4s ease; border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        #panel.open { right: 0; }
        #chatBox::-webkit-scrollbar { width: 4px; }
        #chatBox::-webkit-scrollbar-thumb { background: var(--border); }

        @keyframes spin { to { transform: rotate(360deg); } }
        #loader { display: none; flex-direction: column; align-items: center; gap: 20px; }
    </style>
</head>
<body>

<div class="glow-orb g1"></div>
<div class="glow-orb g2"></div>

<header>
    <div class="logo">AEVON</div>
</header>

<div class="container">
    <div id="hero">
        <h1 class="hero-title">Master anything.<br>One day at a time.</h1>
        <div class="input-wrap">
            <input id="skillInput" placeholder="What do you want to learn?">
        </div>
        <button class="btn-forge" onclick="forge()">FORGE YOUR PATH</button>
    </div>

    <div id="loader">
        <div style="width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
        <p style="font-family: 'DM Mono'; font-size: 10px; color: var(--muted); letter-spacing: 2px;">CALCULATING ROADMAP...</p>
    </div>

    <div id="roadmap">
        <div class="progress-meta" style="display:flex; justify-content:space-between; font-family:'DM Mono'; font-size:10px;">
            <div id="skillLabel" style="color:var(--accent); letter-spacing:1px;"></div>
            <div id="progressCount" style="color:var(--muted);">Day 1 / 7</div>
        </div>
        <div class="progress-track"><div id="progressFill" class="progress-fill" style="width: 14%"></div></div>

        <div class="slider-viewport">
            <div id="sliderTrack" class="slider-track"></div>
        </div>

        <div class="slide-nav">
            <button class="nav-btn" onclick="moveSlide(-1)" id="prevBtn" disabled>←</button>
            <div class="nav-dots" id="navDots"></div>
            <button class="nav-btn" onclick="moveSlide(1)" id="nextBtn">→</button>
        </div>
    </div>
</div>

<div class="coach-fab" onclick="togglePanel()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#060608" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
</div>

<div id="panel">
    <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items:center;">
        <span style="color:var(--accent); font-family:'DM Mono'; font-size:11px; letter-spacing:2px;">AEVON COACH</span>
        <button onclick="togglePanel()" style="background:none; border:none; color:var(--muted); cursor:pointer; font-family:'DM Mono'; font-size:10px;">CLOSE</button>
    </div>
    <div id="chatBox" style="flex:1; overflow-y:auto; padding:20px; font-family:'DM Mono'; font-size:13px; line-height:1.6;"></div>
    <div style="padding: 20px; border-top:1px solid var(--border); display:flex; gap:10px;">
        <input id="coachInput" style="flex:1; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; color:white; outline:none; font-family:'DM Mono';" placeholder="Ask a question..." onkeypress="if(event.key==='Enter') askCoach()">
        <button onclick="askCoach()" style="background:var(--accent); border:none; width:44px; height:44px; border-radius:12px; cursor:pointer; display:flex; align-items:center; justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
        </button>
    </div>
</div>

<script>
    let currentRoadmap = [];
    let userSkill = "";
    let currentIndex = 0;

    function togglePanel() { document.getElementById('panel').classList.toggle('open'); }

    async function forge() {
        userSkill = document.getElementById('skillInput').value;
        if (!userSkill) return;
        document.getElementById('hero').style.display = 'none';
        document.getElementById('loader').style.display = 'flex';
        try {
            const res = await fetch('/api/roadmap', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ skill: userSkill })
            });
            const data = await res.json();
            currentRoadmap = data.roadmap;
            renderRoadmap();
        } catch (err) { alert("API Error. Check console."); location.reload(); }
    }

    function renderRoadmap() {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('roadmap').style.display = 'flex';
        document.getElementById('skillLabel').innerText = userSkill.toUpperCase();
        
        const track = document.getElementById('sliderTrack');
        const dots = document.getElementById('navDots');
        track.innerHTML = ""; dots.innerHTML = "";

        currentRoadmap.forEach((day, index) => {
            const slide = document.createElement('div');
            slide.className = 'slide-card';
            slide.innerHTML = `
                <div class="card-inner">
                    <div style="color:var(--accent); font-family:'DM Mono'; font-size:10px; margin-bottom:10px; letter-spacing:2px;">${day.day.toUpperCase()}</div>
                    <h2 style="font-size:22px; margin-bottom:20px; font-weight:800;">${day.title}</h2>
                    <div style="display:flex; flex-direction:column; gap:12px;">
                        ${day.tasks.map(t => `<div style="display:flex; gap:10px; color:rgba(255,255,255,0.6); font-family:'DM Mono'; font-size:12px;"><span style="color:var(--accent)">•</span><span>${t}</span></div>`).join('')}
                    </div>
                </div>`;
            track.appendChild(slide);
            const dot = document.createElement('div');
            dot.className = `nav-dot ${index === 0 ? 'active' : ''}`;
            dots.appendChild(dot);
        });
        updateSlider();
    }

    function moveSlide(dir) {
        currentIndex = Math.max(0, Math.min(currentRoadmap.length - 1, currentIndex + dir));
        updateSlider();
    }

    function updateSlider() {
        const track = document.getElementById('sliderTrack');
        const dots = document.querySelectorAll('.nav-dot');
        track.style.transform = `translateX(-${currentIndex * 100}%)`;
        dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
        document.getElementById('progressCount').innerText = `Day ${currentIndex + 1} / 7`;
        document.getElementById('progressFill').style.width = `${((currentIndex + 1) / 7) * 100}%`;
        document.getElementById('prevBtn').disabled = currentIndex === 0;
        document.getElementById('nextBtn').disabled = currentIndex === currentRoadmap.length - 1;
    }

    async function askCoach() {
        const input = document.getElementById('coachInput');
        const msg = input.value;
        if (!msg) return;
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML += `<div style="margin-bottom:20px; padding:10px; background:rgba(255,255,255,0.05); border-radius:8px;">${msg}</div>`;
        input.value = "";
        try {
            const res = await fetch('/api/coach', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, skill: userSkill, roadmap: currentRoadmap, currentDay: currentIndex })
            });
            const data = await res.json();
            chatBox.innerHTML += `<div style="margin-bottom:20px; color:var(--accent); white-space:pre-wrap;">${data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (err) { chatBox.innerHTML += `<div style="color:red;">Offline.</div>`; }
    }
</script>
</body>
</html>
