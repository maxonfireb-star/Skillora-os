<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEVON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #c8f562;
            --accent2: #7efff5;
            --bg: #060608;
            --card: #0d0d10;
            --card2: #111116;
            --border: rgba(255,255,255,0.07);
            --text: #f0f0f0;
            --muted: #555;
            --radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        /* NOISE OVERLAY */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
            opacity: 0.4;
        }

        /* AMBIENT GLOW */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        .glow-orb.g1 { width: 500px; height: 500px; background: rgba(200,245,98,0.04); top: -200px; left: -100px; }
        .glow-orb.g2 { width: 400px; height: 400px; background: rgba(126,255,245,0.03); bottom: -150px; right: -100px; }

        /* HEADER */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 28px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(6,6,8,0.9), transparent);
        }

        .logo {
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--accent);
            font-family: 'DM Mono', monospace;
        }

        .header-tag {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 2px;
        }

        /* MAIN CONTAINER */
        .container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* HERO */
        #hero {
            width: 100%;
            max-width: 440px;
            text-align: center;
            animation: fadeUp 0.8s ease both;
        }

        .hero-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .hero-title {
            font-size: clamp(36px, 10vw, 56px);
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-sub {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 40px;
            font-family: 'DM Mono', monospace;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 12px;
        }

        .input-wrap input {
            width: 100%;
            padding: 18px 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-wrap input:focus {
            border-color: rgba(200,245,98,0.3);
            box-shadow: 0 0 0 3px rgba(200,245,98,0.06), 0 0 40px rgba(200,245,98,0.05);
        }

        .input-wrap input::placeholder { color: #333; }

        .btn-forge {
            width: 100%;
            padding: 18px;
            border-radius: var(--radius);
            border: none;
            background: var(--accent);
            color: #060608;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 3px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s, opacity 0.2s;
        }

        .btn-forge:hover { transform: translateY(-2px); box-shadow: 0 20px 50px rgba(200,245,98,0.25); }
        .btn-forge:active { transform: translateY(0); }

        /* LOADER */
        #loader {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: fadeUp 0.4s ease both;
        }

        .loader-ring {
            width: 48px; height: 48px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loader-text {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--muted);
            animation: pulse 1.5s ease infinite;
        }

        /* ROADMAP */
        #roadmap {
            display: none;
            width: 100%;
            max-width: 440px;
            flex-direction: column;
            align-items: center;
            animation: fadeUp 0.6s ease both;
        }

        /* Progress bar */
        .progress-bar-wrap {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-skill {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .progress-count {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .progress-track {
            width: 100%;
            height: 2px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* CARD SLIDER */
        .slider-viewport {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .slider-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .slide-card {
            min-width: 100%;
            padding: 2px;
        }

        .card-inner {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px 28px;
            min-height: 300px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .card-inner.completed {
            border-color: rgba(200,245,98,0.25);
        }

        .card-inner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200,245,98,0.2), transparent);
        }

        .card-day {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-day-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .card-title {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 24px;
            color: #fff;
        }

        .card-tasks { display: flex; flex-direction: column; gap: 12px; }

        .card-task {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            line-height: 1.5;
            font-family: 'DM Mono', monospace;
            font-weight: 300;
        }

        .task-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            margin-top: 6px;
            opacity: 0.6;
        }

        .complete-btn {
            position: absolute;
            bottom: 24px; right: 24px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .complete-btn:hover { border-color: var(--accent); color: var(--accent); }
        .complete-btn.done { border-color: var(--accent); color: var(--accent); background: rgba(200,245,98,0.08); }

        /* NAV */
        .slide-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 20px;
            padding: 0 4px;
        }

        .nav-btn {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--card2);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: #fff;
            transition: all 0.25s;
        }

        .nav-btn:hover { background: var(--card); border-color: rgba(255,255,255,0.15); transform: scale(1.05); }
        .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none; }

        .nav-dots { display: flex; gap: 6px; }

        .nav-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.3s;
            cursor: pointer;
        }

        .nav-dot.active { background: var(--accent); width: 18px; border-radius: 3px; }
        .nav-dot.completed-dot { background: rgba(200,245,98,0.4); }

        /* RESET */
        .reset-btn {
            margin-top: 16px;
            background: none;
            border: none;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .reset-btn:hover { color: #fff; }

        /* COACH BUTTON */
        .coach-fab {
            position: fixed;
            bottom: 28px; right: 28px;
            width: 56px; height: 56px;
            background: var(--accent);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(200,245,98,0.3);
            transition: transform 0.25s, box-shadow 0.25s;
        }

        .coach-fab:hover { transform: scale(1.08) translateY(-2px); box-shadow: 0 20px 60px rgba(200,245,98,0.4); }
        .coach-fab svg { color: #060608; }

        /* COACH PANEL */
        #panel {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; max-width: 400px;
            height: 100%;
            background: #08080a;
            z-index: 2000;
            transition: right 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        #panel.open { right: 0; }

        .panel-header {
            padding: 28px 24px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .panel-title {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--accent);
        }

        .panel-close {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--muted);
            cursor: pointer;
            transition: color 0.2s;
            background: none; border: none;
        }
        .panel-close:hover { color: #fff; }

        .panel-context {
            padding: 14px 24px;
            background: rgba(200,245,98,0.04);
            border-bottom: 1px solid var(--border);
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: rgba(200,245,98,0.5);
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        #chatBox::-webkit-scrollbar { width: 3px; }
        #chatBox::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .msg {
            max-width: 88%;
            animation: fadeUp 0.3s ease both;
        }

        .msg.user {
            align-self: flex-end;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 16px 16px 4px 16px;
            padding: 12px 16px;
            font-size: 13px;
            line-height: 1.5;
            font-family: 'DM Mono', monospace;
            font-weight: 300;
        }

        .msg.coach {
            align-self: flex-start;
        }

        .msg-label {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .msg-bubble {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px;
            padding: 14px 16px;
            font-size: 13px;
            line-height: 1.65;
            color: rgba(255,255,255,0.85);
            font-family: 'DM Mono', monospace;
            font-weight: 300;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px 16px 16px 16px;
            width: fit-content;
        }

        .typing-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.4;
            animation: typingBounce 1.2s ease infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        /* Chat input area */
        .panel-input-area {
            padding: 16px 24px 28px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .chat-input-wrap {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-wrap input {
            flex: 1;
            padding: 14px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: #fff;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 300;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input-wrap input:focus { border-color: rgba(200,245,98,0.25); }
        .chat-input-wrap input::placeholder { color: #2a2a2a; }

        .send-btn {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: transform 0.2s, opacity 0.2s;
        }

        .send-btn:hover { transform: scale(1.08); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn svg { color: #060608; }

        /* KEYBOARD SHORTCUTS HINT */
        .hint {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: #222;
            text-align: center;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        .hidden { display: none !important; }

        /* Touch swipe */
        .slider-viewport { touch-action: pan-y; }
    </style>
</head>
<body>

<div class="glow-orb g1"></div>
<div class="glow-orb g2"></div>

<header>
    <div class="logo">AEVON</div>
    <div class="header-tag">LEARN ANYTHING</div>
</header>

<div class="container">

    <!-- HERO -->
    <div id="hero">
        <div class="hero-label">AI-POWERED LEARNING</div>
        <h1 class="hero-title">Master anything.<br>One day at a time.</h1>
        <p class="hero-sub">Your personal AI builds the path. You walk it.</p>
        <div class="input-wrap">
            <input id="skillInput" placeholder="What do you want to learn?" 
                onkeypress="if(event.key==='Enter') forge()">
        </div>
        <button class="btn-forge" onclick="forge()">FORGE YOUR PATH</button>
    </div>

    <!-- LOADER -->
    <div id="loader">
        <div class="loader-ring"></div>
        <div class="loader-text">BUILDING YOUR ROADMAP</div>
    </div>

    <!-- ROADMAP -->
    <div id="roadmap">
        <div class="progress-bar-wrap">
            <div class="progress-meta">
                <div class="progress-skill" id="skillLabel"></div>
                <div class="progress-count" id="progressCount">1 / 7</div>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width: 14.28
